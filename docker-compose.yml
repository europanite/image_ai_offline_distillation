services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./backend/app:/app
      - ./artifacts:/artifacts
      - ./data:/data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      REACT_NATIVE_PACKAGER_HOSTNAME: localhost
      EXPO_PUBLIC_API_BASE: http://localhost:${BACKEND_PORT:-8000}
      EXPO_NO_TELEMETRY: "1"
      BROWSER: "none"
      CI: "0"
    ports:
      - "8081:8081"
    depends_on:
      - backend
